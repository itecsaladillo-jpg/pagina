<!-- ============================================================
     ASISTENTE ITEC — Widget Flotante
     Pegar antes del cierre de </body>
     ============================================================ -->
<style>
  #itec-chat-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #004488;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,68,136,.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: transform .2s, box-shadow .2s;
  }
  #itec-chat-btn:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(0,68,136,.6); }
  #itec-chat-btn svg  { width: 28px; height: 28px; fill: #fff; }

  #itec-chat-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 340px;
    height: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    font-family: 'Segoe UI', system-ui, sans-serif;
    opacity: 0;
    transform: translateY(20px) scale(.97);
    pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  #itec-chat-window.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  #itec-chat-header {
    background: #004488;
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #itec-chat-header .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #itec-chat-header .info .name  { font-weight: 700; font-size: 14px; }
  #itec-chat-header .info .status{ font-size: 11px; opacity: .75; }
  #itec-chat-header button {
    margin-left: auto; background: none; border: none;
    color: #fff; cursor: pointer; font-size: 20px; line-height: 1;
  }

  #itec-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f5f7fa;
  }
  #itec-messages::-webkit-scrollbar { width: 4px; }
  #itec-messages::-webkit-scrollbar-thumb { background: #c8d0da; border-radius: 4px; }

  .itec-msg {
    max-width: 82%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .itec-msg.bot  { background: #e8edf3; color: #1a2535; border-bottom-left-radius: 4px; align-self: flex-start; }
  .itec-msg.user { background: #004488; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
  .itec-msg.error{ background: #fde8e8; color: #b00020; border: 1px solid #f5c6c6; }

  .itec-typing {
    display: flex; gap: 5px; padding: 10px 14px;
    background: #e8edf3; border-radius: 14px; border-bottom-left-radius: 4px;
    align-self: flex-start; width: fit-content;
  }
  .itec-typing span {
    width: 7px; height: 7px; background: #7a8fa6;
    border-radius: 50%; animation: itecBounce 1.2s infinite;
  }
  .itec-typing span:nth-child(2){ animation-delay: .2s; }
  .itec-typing span:nth-child(3){ animation-delay: .4s; }
  @keyframes itecBounce {
    0%,60%,100%{ transform: translateY(0); }
    30%         { transform: translateY(-6px); }
  }

  #itec-input-area {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid #e2e7ee;
    background: #fff;
    flex-shrink: 0;
  }
  #itec-input {
    flex: 1;
    border: 1.5px solid #d0d8e4;
    border-radius: 22px;
    padding: 9px 15px;
    font-size: 13.5px;
    outline: none;
    resize: none;
    height: 42px;
    max-height: 42px;
    font-family: inherit;
  }
  #itec-input:focus { border-color: #004488; }
  #itec-send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #004488; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
  }
  #itec-send-btn:hover { background: #0055aa; }
  #itec-send-btn svg { width: 18px; height: 18px; fill: #fff; }
  #itec-send-btn:disabled { background: #a0b0c0; cursor: not-allowed; }
</style>

<!-- Botón flotante -->
<button id="itec-chat-btn" aria-label="Abrir asistente ITEC">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
  </svg>
</button>

<!-- Ventana del chat -->
<div id="itec-chat-window" role="dialog" aria-label="Asistente ITEC">
  <div id="itec-chat-header">
    <div class="avatar">🎓</div>
    <div class="info">
      <div class="name">Asistente ITEC</div>
      <div class="status">En línea · Modelo LLaMA 3.1</div>
    </div>
    <button id="itec-close-btn" aria-label="Cerrar chat">✕</button>
  </div>

  <div id="itec-messages">
    <div class="itec-msg bot">¡Hola! Soy el Asistente Virtual del ITEC. ¿En qué puedo ayudarte hoy?</div>
  </div>

  <div id="itec-input-area">
    <textarea
      id="itec-input"
      placeholder="Escribe tu consulta..."
      rows="1"
      aria-label="Mensaje para el asistente"
    ></textarea>
    <button id="itec-send-btn" aria-label="Enviar mensaje">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
(function () {
  const CHAT_API = 'http://localhost:8000/chat';

  const btn      = document.getElementById('itec-chat-btn');
  const win      = document.getElementById('itec-chat-window');
  const closeBtn = document.getElementById('itec-close-btn');
  const input    = document.getElementById('itec-input');
  const sendBtn  = document.getElementById('itec-send-btn');
  const messages = document.getElementById('itec-messages');

  // Toggle ventana
  btn.addEventListener('click', () => win.classList.toggle('open'));
  closeBtn.addEventListener('click', () => win.classList.remove('open'));

  // Enter para enviar (Shift+Enter = nueva línea)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  });
  sendBtn.addEventListener('click', enviar);

  function agregarMensaje(texto, tipo) {
    const div = document.createElement('div');
    div.className = 'itec-msg ' + tipo;
    div.textContent = texto;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function mostrarTyping() {
    const div = document.createElement('div');
    div.className = 'itec-typing';
    div.id = 'itec-typing-indicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function ocultarTyping() {
    const t = document.getElementById('itec-typing-indicator');
    if (t) t.remove();
  }

  async function enviar() {
    const texto = input.value.trim();
    if (!texto || sendBtn.disabled) return;

    input.value = '';
    sendBtn.disabled = true;
    agregarMensaje(texto, 'user');
    mostrarTyping();

    try {
      const res = await fetch(CHAT_API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: texto })
      });

      ocultarTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Error del servidor (${res.status})`);
      }

      const data = await res.json();
      agregarMensaje(data.response || 'Sin respuesta.', 'bot');

    } catch (e) {
      ocultarTyping();
      agregarMensaje('⚠️ ' + (e.message || 'Error de conexión. Verifica que el servidor esté activo.'), 'error');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
})();
</script>
<!-- ============ FIN ASISTENTE ITEC ============ -->
